<!DOCTYPE html>
<!-- DTD é o Document Type Definition e informa para o
navegador a versão do HTML que está sendo carregada.
Assim o navegador pode carregar um conjunto de 
bibliotecas de acordo com a versão específica.
 -->

<!-- ATRIBUTOS:
Os atributos são do tipo chave = valor.
Ex: lang="pt-BR", isso é um atributo que pode ir em qualquer tag de 
conteúdo. <html lang="pt-BR"> ... </html>

-->

<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aula professor Alexandre</title>

<body>
<p>Hello World</p>
</body>

</head>

</html>
